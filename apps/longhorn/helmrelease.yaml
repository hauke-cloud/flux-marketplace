---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  chart:
    spec:
      chart: longhorn
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: longhorn
      version: "*"
  targetNamespace: longhorn-system
  valuesFrom:
    - kind: ConfigMap
      name: longhorn-values
      optional: true
  values:
    defaultSettings:
      v1DataEngine: true
      v2DataEngine: false
      defaultDataPath: /var/lib/longhorn
      defaultReplicaCount: 3
      storageMinimalAvailablePercentage: 10
      createDefaultDiskLabeledNodes: false
    persistence:
      defaultClass: false
      defaultClassReplicaCount: 3
      dataEngine: v1
      defaultDiskSelector:
        enable: true
        selector: "data"
    longhornManager:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
    longhornDriver:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
  interval: 5m0s
