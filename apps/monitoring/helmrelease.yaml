---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: monitoring
spec:
  chart:
    spec:
      chart: monitoring
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: hauke-cloud
      version: "*"
  targetNamespace: monitoring
  values: {}
  valuesFrom:
    - kind: ConfigMap
      name: helm-values-monitoring
      optional: true
  interval: 5m0s
